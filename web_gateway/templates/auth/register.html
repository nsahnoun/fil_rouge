<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CephAnalysis — Créer un compte</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1>CephAnalysis</h1>
            <p class="subtitle">Créer un compte</p>
            <form id="register-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Prénom</label>
                        <input type="text" name="first_name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Nom</label>
                        <input type="text" name="last_name" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" name="password" class="form-control" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary">Créer le compte</button>
                <div id="register-error" class="form-error" style="display:none"></div>
            </form>
            <div class="login-footer">
                <a href="/login">Déjà un compte ? Se connecter</a>
            </div>
        </div>
    </div>
    <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const data = { email: form.email.value, password: form.password.value, first_name: form.first_name.value, last_name: form.last_name.value };
        const resp = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
        });
        if (resp.ok) { window.location.href = '/dashboard'; }
        else {
            const err = await resp.json();
            const el = document.getElementById('register-error');
            el.textContent = err.detail || 'Erreur';
            el.style.display = 'block';
        }
    });
    </script>
</body>
</html>
