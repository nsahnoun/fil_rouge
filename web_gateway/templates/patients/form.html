{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ title }}</h1>
    <a href="/patients" class="btn btn-ghost">← Retour</a>
</div>

<div class="card" style="max-width:720px">
    <form id="patient-form">
        <div class="form-row">
            <div class="form-group">
                <label>Prénom *</label>
                <input type="text" name="first_name" class="form-control" required value="{{ patient.first_name or '' }}">
            </div>
            <div class="form-group">
                <label>Nom *</label>
                <input type="text" name="last_name" class="form-control" required value="{{ patient.last_name or '' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Date de naissance *</label>
                <input type="date" name="birth_date" class="form-control" required value="{{ patient.birth_date or '' }}">
            </div>
            <div class="form-group">
                <label>Genre</label>
                <select name="gender" class="form-control">
                    <option value="">—</option>
                    <option value="M" {{ 'selected' if patient.gender == 'M' }}>Masculin</option>
                    <option value="F" {{ 'selected' if patient.gender == 'F' }}>Féminin</option>
                    <option value="O" {{ 'selected' if patient.gender == 'O' }}>Autre</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="{{ patient.email or '' }}">
            </div>
            <div class="form-group">
                <label>Téléphone</label>
                <input type="tel" name="phone" class="form-control" value="{{ patient.phone or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Adresse</label>
            <textarea name="address" class="form-control" rows="2">{{ patient.address or '' }}</textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>ID Médical</label>
                <input type="text" name="medical_id" class="form-control" value="{{ patient.medical_id or '' }}">
            </div>
            <div class="form-group">
                <label>Médecin référent</label>
                <input type="text" name="referring_doctor" class="form-control" value="{{ patient.referring_doctor or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Antécédents médicaux</label>
            <textarea name="medical_history" class="form-control" rows="3">{{ patient.medical_history or '' }}</textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Allergies</label>
                <input type="text" name="allergies" class="form-control" value="{{ patient.allergies or '' }}">
            </div>
            <div class="form-group">
                <label>Médicaments</label>
                <input type="text" name="medications" class="form-control" value="{{ patient.medications or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Assurance</label>
            <input type="text" name="insurance_info" class="form-control" value="{{ patient.insurance_info or '' }}">
        </div>
        <div style="display:flex;gap:12px;margin-top:8px">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
            <a href="/patients" class="btn btn-secondary">Annuler</a>
        </div>
        <div id="form-error" class="form-error" style="display:none"></div>
    </form>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('patient-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const raw = Object.fromEntries(new FormData(form).entries());
    const data = {};
    for (const [k, v] of Object.entries(raw)) {
        if (v !== '') data[k] = v;
    }
    const isEdit = {{ 'true' if patient and patient.id else 'false' }};
    const url = isEdit ? `/api/patients/{{ patient.id }}` : '/api/patients';
    const method = isEdit ? 'PUT' : 'POST';
    const resp = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
    });
    if (resp.ok) {
        const result = await resp.json();
        window.location.href = isEdit ? `/patients/{{ patient.id }}` : `/patients/${result.id}`;
    } else {
        const err = await resp.json();
        const el = document.getElementById('form-error');
        el.textContent = err.detail || 'Erreur lors de l\'enregistrement';
        el.style.display = 'block';
    }
});
</script>
{% endblock %}
